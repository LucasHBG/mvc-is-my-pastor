<!-- Quick Actions -->
<div class="dashboard-card quick-actions">
  <h3>Quick Actions</h3>
  <div class="actions-grid">
    <app-card
      *ngFor="let action of quickActions"
      [content]="{
        title: action.title,
        icon: action.icon
      }"
      variant="feature"
      size="small"
      [routerLink]="action.route"
      class="action-card">
    </app-card>
  </div>
</div>
